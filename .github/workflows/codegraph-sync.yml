name: CodeGraph Sync

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version for codegraph CLI'
        type: string
        default: '22'
      upload-artifact:
        description: 'Upload .codegraph/ as artifact (useful for PR review context)'
        type: boolean
        default: false
    secrets:
      CODEGRAPH_TOKEN:
        description: 'Optional: token for private codegraph registry'
        required: false

jobs:
  codegraph-sync:
    name: CodeGraph index sync
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for accurate call-graph

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install CodeGraph CLI
        run: npm install -g @colbymchenry/codegraph

      - name: Restore cached index
        uses: actions/cache@v4
        with:
          path: .codegraph/
          key: codegraph-${{ runner.os }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js', '**/*.go', '**/*.py') }}
          restore-keys: |
            codegraph-${{ runner.os }}-

      - name: Init (first time) or Sync (subsequent)
        run: |
          if [ -f ".codegraph/config.json" ]; then
            echo "Existing index found — running sync"
            codegraph sync
          else
            echo "No index found — running init"
            codegraph init -i
          fi

      - name: Upload artifact
        if: inputs.upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: codegraph-index
          path: .codegraph/
          retention-days: 7

